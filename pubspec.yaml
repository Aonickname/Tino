name: tino
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  carousel_slider: ^4.2.1
  smooth_page_indicator: ^1.0.0+2
  http: ^0.13.0
  path_provider: ^2.0.11
  intl: ^0.18.1
  file_picker: ^8.0.0
  table_calendar: ^3.0.9

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/Icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/banner.jpg
    - assets/images/new_meeting.jpg
    - assets/images/question_tino.jpg
    - assets/images/search_tino.jpg
    - assets/images/user1.jpg
    - assets/meetings.json
